  name: build-windows-pyd-static

  on:
    workflow_dispatch:
    push:
      branches: [ main ]

  jobs:
    build:
      runs-on: windows-latest
      strategy:
        fail-fast: false
        matrix:
          pyver: ["3.9", "3.10"]

      env:
        VCPKG_ROOT: C:\vcpkg
        VCPKG_DEFAULT_TRIPLET: x64-windows-static-md

      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Setup Python
          uses: actions/setup-python@v5
          with:
            python-version: ${{ matrix.pyver }}
            architecture: x64

        - name: Clone & bootstrap vcpkg
          shell: pwsh
          run: |
            git clone https://github.com/microsoft/vcpkg.git $env:VCPKG_ROOT
            & "$env:VCPKG_ROOT\bootstrap-vcpkg.bat"

        - name: Install dependencies (static-md)
          shell: pwsh
          run: |
            & "$env:VCPKG_ROOT\vcpkg.exe" install `
              opencv4:x64-windows-static-md `
              brotli:x64-windows-static-md `
              pybind11:x64-windows-static-md

        - name: Patch CMakeLists for brotlicommon link
          shell: pwsh
          run: |
            $cmakeFile = "cpp/CMakeLists.txt"
            $txt = Get-Content $cmakeFile -Raw

            # Ensure brotlicommon is discovered
            if ($txt -notmatch "find_library\(BROTLICOMMON_LIB") {
              $txt = $txt -replace "find_library\(BROTLIDEC_LIB NAMES brotlidec\)",
                                   "find_library(BROTLIDEC_LIB NAMES brotlidec)`nfind_library(BROTLICOMMON_LIB NAMES brotlicommon)"
            }

            # Ensure check includes brotlicommon
            $txt = $txt -replace "if\(NOT BROTLIENC_LIB OR NOT BROTLIDEC_LIB\)",
                                 "if(NOT BROTLIENC_LIB OR NOT BROTLIDEC_LIB OR NOT BROTLICOMMON_LIB)"
            $txt = $txt -replace "Cannot find Brotli libraries \(brotlienc / brotlidec\)\.",
                                 "Cannot find Brotli libraries (brotlienc / brotlidec / brotlicommon)."

            # Ensure link list includes brotlicommon
            if ($txt -match "set\(BROTLI_LIBRARIES\s+\$\{BROTLIENC_LIB\}\s+\$\{BROTLIDEC_LIB\}\)") {
              $txt = $txt -replace "set\(BROTLI_LIBRARIES\s+\$\{BROTLIENC_LIB\}\s+\$\{BROTLIDEC_LIB\}\)",
                                   "set(BROTLI_LIBRARIES `${BROTLIENC_LIB} `${BROTLIDEC_LIB} `${BROTLICOMMON_LIB})"
            } elseif ($txt -notmatch "BROTLICOMMON_LIB") {
              # fallback: append a force-set if pattern changed
              $txt += "`nset(BROTLI_LIBRARIES `${BROTLIENC_LIB} `${BROTLIDEC_LIB} `${BROTLICOMMON_LIB})`n"
            }

            Set-Content -Path $cmakeFile -Value $txt -NoNewline

        - name: Configure CMake
          shell: pwsh
          run: |
            cmake -S cpp -B build -G "Visual Studio 17 2022" -A x64 `
              -DCMAKE_BUILD_TYPE=Release `
              -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake" `
              -DVCPKG_TARGET_TRIPLET=x64-windows-static-md `
              -DPython3_EXECUTABLE="$env:pythonLocation\python.exe"

        - name: Build trvl
          shell: pwsh
          run: |
            cmake --build build --config Release --target trvl -j 4

        - name: Smoke test import
          shell: pwsh
          run: |
            $pyd = Get-ChildItem -Recurse build -Filter "trvl*.pyd" | Select-Object -First 1
            if (-not $pyd) { throw "No trvl*.pyd found after build" }
            $env:PYTHONPATH = $pyd.DirectoryName
            python -c "import trvl; print(trvl); print(hasattr(trvl,'TrvlDecoder'), hasattr(trvl,'TrvlEncoder'))"

        - name: Collect artifact
          shell: pwsh
          run: |
            New-Item -ItemType Directory -Force -Path artifacts | Out-Null
            $pyd = Get-ChildItem -Recurse build -Filter "trvl*.pyd" | Select-Object -First 1
            Copy-Item $pyd.FullName ("artifacts/trvl-py" + "${{ matrix.pyver }}" + "-" + $pyd.Name)

        - name: Upload artifact
          uses: actions/upload-artifact@v4
          with:
            name: trvl-windows-static-py${{ matrix.pyver }}
            path: artifacts/*
